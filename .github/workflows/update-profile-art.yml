name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/update-profile-art.yml"

permissions:
  contents: write

concurrency:
  group: update-profile-art
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_PROFILE_USER: Deekshith06

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Fetch verified public contribution data
        run: python scripts/fetch_contributions.py

      - name: Render contribution graph
        run: python scripts/render_heatmap_svg.py

      - name: Regenerate profile information card
        run: python scripts/make_info_card.py

      - name: Commit refreshed assets
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: refresh verified profile assets [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg info-card.svg"
